<!DOCTYPE html>
<html lang="es">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MagicLand — Compra de Tickets</title>
    <meta name="description" content="Compra tus entradas para MagicLand, el parque de atracciones más emocionante. Elige tus tickets, selecciona la fecha y disfruta." />
    <meta name="robots" content="noindex, nofollow" />

    <!--
      Content Security Policy
      - default-src 'self': solo recursos del propio origen por defecto
      - script-src 'self' 'unsafe-inline': necesario para el bundle de Vite/React en desarrollo;
        en producción se puede restringir a hashes de script específicos
      - style-src 'self' 'unsafe-inline': Tailwind genera estilos inline en dev
      - img-src 'self' data: https://images.unsplash.com: imágenes propias + hero de Unsplash
      - font-src 'self': fuentes locales únicamente
      - connect-src 'self': fetch/XHR solo al propio origen
      - object-src 'none': bloquea plugins como Flash
      - frame-ancestors 'none': impide que la app se cargue en un iframe (anti-clickjacking)
      - base-uri 'self': evita ataques de inyección de <base>
      - form-action 'self': el formulario de pago nunca puede enviarse a un dominio externo
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline';
        style-src   'self' 'unsafe-inline';
        img-src     'self' data: https://images.unsplash.com;
        font-src    'self';
        connect-src 'self';
        object-src  'none';
        frame-ancestors 'none';
        base-uri    'self';
        form-action 'self';
      "
    />

    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>

  </head>

  <body>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
